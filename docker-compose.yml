services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"
    networks:
      - backend

  api1:
    image: rinha-fraud-go:latest
    environment:
      PORT: "8080"
      INDEX_PATH: "/data/index.bin"
      MCC_PATH: "/resources/mcc_risk.json"
      NORM_PATH: "/resources/normalization.json"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    networks:
      - backend

  api2:
    image: rinha-fraud-go:latest
    environment:
      PORT: "8080"
      INDEX_PATH: "/data/index.bin"
      MCC_PATH: "/resources/mcc_risk.json"
      NORM_PATH: "/resources/normalization.json"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    networks:
      - backend

networks:
  backend:
    driver: bridge
